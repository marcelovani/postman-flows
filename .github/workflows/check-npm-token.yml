name: Check NPM Token

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 09:00 UTC
  workflow_dispatch:      # allow manual trigger

jobs:
  check-token:
    name: Verify NPM_TOKEN is still valid
    runs-on: ubuntu-latest
    steps:
      - name: Check token
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.NPM_TOKEN }}" \
            https://registry.npmjs.org/-/whoami)

          if [ "$STATUS" != "200" ]; then
            echo "::error::NPM_TOKEN is invalid or expired (HTTP $STATUS). Generate a new Automation token at npmjs.com and update the NPM_TOKEN secret in GitHub."
            exit 1
          fi

          echo "NPM_TOKEN is valid."
