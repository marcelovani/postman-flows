name: Newman API Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  newman:
    name: Newman
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Run Newman — all requests (smoke test)
        run: ENV=ci make test-newman
        continue-on-error: true
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          MEMBER_USERNAME: ${{ secrets.MEMBER_USERNAME }}
          MEMBER_PASSWORD: ${{ secrets.MEMBER_PASSWORD }}

      - name: Run Newman — all flows
        run: ENV=ci make test-newman-flows
        continue-on-error: false
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          MEMBER_USERNAME: ${{ secrets.MEMBER_USERNAME }}
          MEMBER_PASSWORD: ${{ secrets.MEMBER_PASSWORD }}

      - name: Store Newman artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-results
          path: tests/results/newman
          if-no-files-found: ignore
          retention-days: 7
